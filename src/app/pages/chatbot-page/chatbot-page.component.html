<main class="flex h-screen flex-col bg-base-300 text-base-content">
  <header class="flex shrink-0 items-center justify-between gap-3 border-b border-base-content/10 bg-base-200 px-4 py-3">
    <div class="flex items-center gap-3">
      <span class="luma-orb h-9 w-9 text-base">✨</span>
      <div>
        <p class="font-semibold leading-tight">{{ luma.name }}</p>
        <p class="text-xs text-base-content/55">{{ luma.role }}</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <app-theme-toggle />
      <a routerLink="/" class="btn btn-ghost btn-sm">← Volver</a>
    </div>
  </header>

  <section class="min-h-0 flex-1">
    <app-chatbot class="block h-full" [fullHeight]="true" />
  </section>
</main>
