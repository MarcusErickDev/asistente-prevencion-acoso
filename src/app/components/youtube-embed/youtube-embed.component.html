<div class="aspect-video w-full overflow-hidden rounded-2xl bg-base-200 shadow-lg shadow-info/10">
  @if (safeEmbedUrl) {
    <iframe
      class="h-full w-full"
      [src]="safeEmbedUrl"
      [title]="title"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  }
</div>
